name: Release APK
on:
  push:
    tags:
      - 'v*'
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > ${{ secrets.KEYSTORE_PATH }}

      - name: Build APK
        run: flutter build apk --release --build-name=${{ github.ref_name }}
        env:
          KEYSTORE_PATH: ${{ secrets.KEYSTORE_PATH }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Copy APK
        run: cp build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/classhub.apk

      - name: Extract changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -n "/^## v$VERSION/,/^## v/p" CHANGELOG.md | sed '$d' > release_notes.md

      - name: Compute SHA-256
        run: sha256sum build/app/outputs/flutter-apk/classhub.apk | cut -d' ' -f1 > build/app/outputs/flutter-apk/classhub.apk.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Classhub ${{ github.ref_name }}
          body_path: release_notes.md
          files: |
            build/app/outputs/flutter-apk/classhub.apk
            build/app/outputs/flutter-apk/classhub.apk.sha256
