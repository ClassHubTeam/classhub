name: Release APK

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Create GitHub Release (private repo)
        uses: softprops/action-gh-release@v2
        with:
          name: Classhub ${{ github.ref_name }}
          files: build/app/outputs/flutter-apk/app-debug.apk

      - name: Publish APK to public releases repo
        uses: softprops/action-gh-release@v2
        with:
          repository: titanknis/classhub-releases
          name: Classhub ${{ github.ref_name }}
          files: build/app/outputs/flutter-apk/app-debug.apk
          token: ${{ secrets.PUBLIC_REPO_PAT }}
