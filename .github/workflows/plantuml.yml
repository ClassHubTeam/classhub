name: Render PlantUML diagrams

on:
  push:
    paths:
      - 'docs/diagrams/**'
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Install Java and Graphviz
        run: sudo apt-get install -qq -y default-jre graphviz

      - name: Download PlantUML
        run: curl -sL https://github.com/plantuml/plantuml/releases/latest/download/plantuml.jar -o plantuml.jar

      - name: Render to SVG
        run: java -jar plantuml.jar -tsvg docs/diagrams/*.puml

      - name: Commit SVGs
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add docs/diagrams/*.svg
          git diff --cached --quiet || git commit -m "chore: render diagrams to SVG"
          git push
